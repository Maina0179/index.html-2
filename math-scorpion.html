<style>

    --bg:#1B1712;
    --surface:#241F18;
    --surface2:#2E2718;
    --grid: rgba(232,217,181,0.055);
    --sand:#EDE1C4;
    --sand-dim:#AFA07C;
    --gold:#D4A24C;
    --gold-dim:#8C6E36;
    --sting:#C1432B;
    --sting-dim:#5A2419;
    --sage:#7A9B5B;
    --sage-dim:#33421F;
    --radius: 14px;
  }
  body.theme-light{
    --bg:#EDE6D3;
    --surface:#F5EFE1;
    --surface2:#E8DFC8;
    --grid: rgba(140,110,54,0.06);
    --sand:#3A3221;
    --sand-dim:#6E624A;
    --gold:#A3762A;
    --gold-dim:#D9C79E;
    --sting:#A6402A;

    --sage-dim:#D2DEC1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 26px 26px;
    color:var(--sand);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em; margin:0; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  #app{ max-width:760px; margin:0 auto; padding:28px 20px 60px; }
  .katex{ font-size:1.05em; }

  .brand{ display:flex; align-items:center; gap:14px; margin-bottom:6px; cursor:pointer; }
  .brand svg{ width:46px; height:30px; flex-shrink:0; }
  .brand-name{ font-size:1.5rem; }
  .brand-tail{ height:3px; width:120px; margin:6px 0 30px 60px; background:linear-gradient(90deg, var(--gold), transparent); border-radius:2px; }
  .tagline{ font-family:'Fraunces', serif; font-weight:700; font-style:italic; color:var(--gold); font-size:1.05rem; margin:-18px 0 22px; letter-spacing:0.01em; }
  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; display:block; }

  .card{
    background:var(--surface);
    border:1px solid rgba(212,162,76,0.16);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
  }
  .card h2{ font-size:1.3rem; margin-bottom:4px; }
  .subtext{ color:var(--sand-dim); font-size:0.9rem; margin-bottom:18px; line-height:1.5; }
  .hint{ color:var(--sand-dim); font-size:0.76rem; margin-top:4px; line-height:1.4; }

  label{ display:block; font-size:0.82rem; color:var(--sand-dim); margin:14px 0 6px; }
  input, select, textarea{
    width:100%; padding:11px 12px; border-radius:9px;

  textarea{ resize:vertical; min-height:80px; font-family:'Space Grotesk'; }
  input:focus, select:focus, textarea:focus{ border-color:var(--gold); }

  input[type=checkbox]{ width:auto; margin-right:8px; }

  .badge{ display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.72rem; font-weight:600; }
  .badge-live{ background:var(--sage-dim); color:var(--sage); }
  .badge-upcoming{ background:var(--gold-dim); color:var(--gold); }

  .type-tag{ display:inline-block; font-size:0.68rem; padding:2px 7px; border-radius:5px; margin-left:6px; text-transform:uppercase; letter-spacing:.04em; }
  .type-mcq{ background:var(--sage-dim); color:var(--sage); }
  .type-upload{ background:var(--gold-dim); color:var(--gold); }

  .qcount{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }

  .toast{
    position:fixed; top:22px; left:50%; transform:translateX(-50%) translateY(-20px);

  .who{ font-size:0.85rem; color:var(--sand-dim); }

  .score-hero{ text-align:center; padding:30px 20px; }

  .score-hero .msg{ color:var(--sand-dim); margin-top:8px; }

  .spinner{ width:18px; height:18px; border:2px solid rgba(237,225,196,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }

  .center{ text-align:center; padding:40px 0; color:var(--sand-dim); }

  .learner-row{ border-bottom:1px solid rgba(237,225,196,0.08); padding:16px 0; }

  .menubar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--surface); border:1px solid rgba(212,162,76,0.16); border-radius:12px; padding:10px 12px; margin-bottom:16px; }
  .menubar .backbtn{ background:var(--surface2); color:var(--gold); padding:8px 13px; font-size:1rem; font-weight:700; margin:0; border-radius:8px; }
  .menubar .mtab{ background:transparent; color:var(--sand-dim); padding:8px 12px; font-size:0.85rem; margin:0; }
  .menubar .mtab.active{ background:var(--gold); color:#1B1712; }

  .menubar .mtab.logoutbtn{ color:var(--sting); margin-left:0; }
  .menubar a.mtab.helplink{ text-decoration:none; display:inline-block; }
  .menubar .hamburgerbtn{ background:var(--surface2); color:var(--gold); font-size:1.1rem; padding:8px 14px; }

  table.resulttable td{ padding:10px 6px; border-bottom:1px solid rgba(237,225,196,0.08); }
  .rating{ display:inline-block; padding:3px 9px; border-radius:6px; font-size:0.72rem; font-weight:700; }
  .rating-BE{ background:var(--sting-dim); color:#E38C79; }
  .rating-AE{ background:var(--gold-dim); color:var(--gold); }
  .rating-ME{ background:var(--sage-dim); color:var(--sage); }
  .rating-EE{ background:#2C4F6B; color:#8FC3E8; }
  .rank-1{ color:var(--gold); font-weight:700; }
  .timer-badge{ text-align:center; font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--gold); background:var(--surface2); border-radius:8px; padding:8px; margin-bottom:16px; }

  #top-loader{
    position:fixed; top:0; left:0; height:3px; width:0%;
    background:var(--gold); z-index:9999; opacity:0;
    transition: width .3s ease, opacity .25s ease;
  }
  #top-loader.active{ opacity:1; width:80%; }
</style>

<div id="app"></div>

<script>
/* =========================================================================
   FIREBASE SETUP — paste your config from the Firebase console here.

   2. Build → Firestore Database → Create database → Start in TEST MODE.
   3. Gear icon → Project settings → scroll to "Your apps" → click </> (web) → register an app.
   4. Copy the firebaseConfig object shown there and paste the values below.
   5. Save, re-upload to GitHub as index.html — Vercel redeploys automatically.
   Test-mode rules are open to anyone and expire after 30 days — fine for now,
   tighten them under Firestore → Rules before real classroom use.
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDkqcZQ72WW_G5Vke0i9xqVixnHXpbsmnU",
  authDomain: "scorpion-john.firebaseapp.com",
  projectId: "scorpion-john",
  storageBucket: "scorpion-john.firebasestorage.app",
  messagingSenderId: "672422036135",
  appId: "1:672422036135:web:3a3aa374adcea5ee409182"
};

let db = null, firebaseReady = false;
try{
  if(firebaseConfig.apiKey !== "YOUR_API_KEY"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){ console.error('Firebase init failed', e); }

/* ---------- thin top loading bar ---------- */
let loaderPending = 0, loaderHideTimeout = null;
function loaderShow(){
  loaderPending++;
  if(loaderHideTimeout){ clearTimeout(loaderHideTimeout); loaderHideTimeout=null; }
  const el = document.getElementById('top-loader');
  if(el){ el.style.width = '0%'; requestAnimationFrame(()=> el.classList.add('active')); }
}
function loaderHide(){
  loaderPending = Math.max(0, loaderPending-1);
  if(loaderPending>0) return;
  const el = document.getElementById('top-loader');
  if(!el) return;
  el.style.width = '100%';
  loaderHideTimeout = setTimeout(()=>{ el.classList.remove('active'); el.style.width='0%'; }, 250);
}

/* ---------- storage helpers, backed by Firestore (shared across every device) ---------- */
async function sGet(key){
  if(!db) return null;
  loaderShow();
  try{
    const snap = await db.collection('appdata').doc(key).get();
    return snap.exists ? snap.data().value : null;
  }catch(e){ console.error('storage get failed', e); return null; }
  finally{ loaderHide(); }
}
async function sSet(key, val){
  if(!db) return null;
  loaderShow();
  try{
    await db.collection('appdata').doc(key).set({ value: val, updatedAt: Date.now() });
    return true;
  }catch(e){ console.error('storage set failed', e); return null; }
  finally{ loaderHide(); }
}
async function sList(prefix){
  if(!db) return [];
  loaderShow();
  try{
    const snaps = await db.collection('appdata')
      .orderBy(firebase.firestore.FieldPath.documentId())
      .startAt(prefix).endAt(prefix + '\uf8ff')
      .get();
    return snaps.docs.map(d=>d.id);
  }catch(e){ console.error('storage list failed', e); return []; }
  finally{ loaderHide(); }
}

function keyify(s){ return s.trim().toLowerCase().replace(/\s+/g,''); }
function fullName(l){ return l.fullName || [l.firstName,l.secondName,l.surname].filter(Boolean).join(' '); }
const USERNAME_RE = /^[A-Za-z]{3,}[0-9]+$/;
function validPassword(p){ return p.length>=4 && /[A-Za-z]/.test(p) && /[0-9]/.test(p); }

const TOPICS = ["Whole Numbers","Fractions","Decimals","Algebra","Calculus","Measurement","Geometry","Data Handling","Money","Time","Ratio & Proportion"];
const MAX_FILE_BYTES = 350 * 1024;
const GRADES = Array.from({length:12},(_,i)=>String(i+1));
let selectedGrade = null;

function gradeOptions(selected){
  return GRADES.map(g=>`<option value="${g}" ${String(selected)===g?'selected':''}>Grade ${g}</option>`).join('');
}
function ratingFor(pct){
  if(pct<30) return 'B.E';
  if(pct<50) return 'A.E';
  if(pct<75) return 'M.E';
  return 'E.E';
}
function ratingClass(rating){ return 'rating-'+rating.replace(/\./g,''); }

function genCode(existing){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code;
  do{
    let tail = "";
    for(let i=0;i<3;i++) tail += chars[Math.floor(Math.random()*chars.length)];
    code = "MS" + tail;
  } while(existing.has(code));
  return code;
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    if(file.size > MAX_FILE_BYTES){ reject(new Error('File is too large — please keep it under 350KB (the shared database has a size limit).')); return; }
    const r = new FileReader();
    r.onload = ()=> resolve({ name:file.name, type:file.type, dataUrl:r.result });
    r.onerror = ()=> reject(new Error('Could not read that file.'));
    r.readAsDataURL(file);
  });
}

/* ---------- app state ---------- */
let state = { view:'home', learner:null, teacher:null, err:'', examDraft:null, activeExam:null, qIndex:0, answers:[], marks:{}, feedback:null, paperAnswerFiles:[] };
let viewHistory = [];

function go(view, extra={}){
  hamburgerOpen = false;
  if(view==='home'){ viewHistory = []; }
  else if(state.view && state.view!==view){ viewHistory.push(state.view); }
  state = {...state, view, err:'', ...extra}; render();
}
function goBack(){
  const prev = viewHistory.pop();
  state = {...state, view: prev || 'learnerDashboard', err:''};
  render();
}

/* ---------- toast ---------- */
function toast(msg, kind){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 300); }, 1800);
}

/* ---------- in-app file preview (opens on top of the app instead of navigating away) ---------- */
window._previewFiles = window._previewFiles || {};
/* ---------- multi-file helpers (also read old single-file data safely) ---------- */
function asFileArray(x){
  if(!x) return [];
  return Array.isArray(x) ? x : [x];
}
async function pickFiles(inputEl){
  const files = Array.from(inputEl.files||[]);
  const out = [];
  for(const file of files){
    try{ out.push(await readFileAsDataURL(file)); }
    catch(e){ toast(e.message, 'bad'); }
  }
  return out;
}
function filesListHTML(filesOrFile, prefix){
  const arr = asFileArray(filesOrFile);
  if(arr.length===0) return `<div class="hint">(no file attached)</div>`;
  return arr.map(f=> fileBtn(f, (prefix?prefix+': ':'')+f.name)).join('<br>');
}

function hasPaper(exam){ return asFileArray(exam.paperFiles||exam.paperFile).length>0; }
function fileBtn(file, label){
  if(!file || !file.dataUrl) return '';
  const key = 'f'+Math.random().toString(36).slice(2,10);
  window._previewFiles[key] = file;
  const text = label || file.name || 'file';
  return `<button type="button" class="dl" onclick="previewFile('${key}')">📄 ${text}</button>`;
}
function previewFile(key){
  const file = window._previewFiles[key];
  if(!file) return;
  const type = file.type || (file.dataUrl.match(/^data:([^;]+);/)||[])[1] || '';
  let body;
  if(type.startsWith('image/')) body = `<img src="${file.dataUrl}">`;
  else if(type==='application/pdf') body = `<iframe src="${file.dataUrl}"></iframe>`;
  else body = `<p class="hint">Preview isn't available for this file type — use download instead.</p>`;
  const overlay = document.createElement('div');
  overlay.className = 'file-preview-overlay';
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="file-preview-modal">
      <div class="file-preview-header">
        <span>${file.name||'File'}</span>
        <button onclick="this.closest('.file-preview-overlay').remove()">✕ Close</button>
      </div>
      <div class="file-preview-body">${body}</div>
      <div class="file-preview-footer">
        <a class="btn-ghost btn-sm" href="${file.dataUrl}" download="${file.name||'file'}">⬇ Download instead</a>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function learnerSignup(){

        grade=val('ls-grade'), email=val('ls-email'), pass=val('ls-pass'), pass2=val('ls-pass2');

  if(!USERNAME_RE.test(username)){ setErr('Username needs at least 3 letters followed by a number, e.g. mwiz01.'); return; }
  if(!validPassword(pass)){ setErr('Password must be at least 4 characters with a mix of letters and numbers.'); return; }
  if(pass!==pass2){ setErr('Passwords do not match.'); return; }
  const uk = keyify(username);

  const takenUser = await sGet('learner:'+uk);
  if(takenUser){ setErr('That username is taken — pick another.'); return; }
  const takenName = await sGet('learnername:'+nk);
  if(takenName){ setErr('An account with that name already exists — try logging in.'); return; }
  const learner = { fullName: fullNameVal, username, school, grade, email, password: pass, theme:'dark' };
  await sSet('learner:'+uk, learner);
  await sSet('learnername:'+nk, { usernameKey: uk });
  toast('Account created — welcome!', 'good');

async function resolveLearner(identifier){
  const k = keyify(identifier);
  let learner = await sGet('learner:'+k);
  let key = k;
  if(!learner){
    const map = await sGet('learnername:'+k);
    if(map){ learner = await sGet('learner:'+map.usernameKey); key = map.usernameKey; }
  }
  return { learner, key };
}

  if(!learner || learner.password !== pass){ setErr('Name/username or password is incorrect.'); return; }

  go('learnerDashboard', { learner });
}

async function enterExamCode(){
  const code = val('ec-code').toUpperCase().trim();
  if(!code){ setErr('Enter a code.'); return; }
  const exam = await sGet('exam:'+code);
  if(!exam){ setErr('No exam found with that code.'); return; }
  const now = Date.now();
  const openAt = new Date(exam.openAt).getTime();
  const closeAt = openAt + exam.durationMinutes*60000;
  const rk = 'examresult:'+code+':'+keyify(fullName(state.learner));
  const prior = await sGet(rk);
  if(prior){ go('examResult', { activeExam: exam, feedback: prior }); return; }
  if(now < openAt){ setErr('This exam opens at '+new Date(openAt).toLocaleString()+'.'); return; }
  if(now > closeAt){ setErr('This exam has closed.'); return; }
  const startIndex = hasPaper(exam) ? -1 : 0;
  startExamTimers();
  go('examTaking', { activeExam: exam, qIndex:startIndex, answers:new Array(exam.questions.length).fill(null), paperAnswerFiles:[] });
}

/* ---------- countdown timer (also syncs extra time a teacher adds mid-exam) ---------- */
let examTimerInterval = null, examTimerTick = 0;
function formatRemaining(exam){
  const closeAt = new Date(exam.openAt).getTime() + exam.durationMinutes*60000;
  const remaining = closeAt - Date.now();
  if(remaining<=0) return "Time's up";
  const mm = Math.floor(remaining/60000), ss = Math.floor((remaining%60000)/1000);
  return mm+':'+String(ss).padStart(2,'0')+' remaining';
}
function startExamTimers(){
  examTimerTick = 0;
  if(examTimerInterval) clearInterval(examTimerInterval);
  examTimerInterval = setInterval(examTimerLoop, 1000);
}
async function examTimerLoop(){
  const el = document.getElementById('exam-countdown');
  if(!el || !state.activeExam){ clearInterval(examTimerInterval); examTimerInterval=null; return; }
  examTimerTick++;
  if(examTimerTick % 20 === 0){
    const latest = await sGet('exam:'+state.activeExam.code);
    if(latest) state.activeExam.durationMinutes = latest.durationMinutes;
  }
  const exam = state.activeExam;
  const closeAt = new Date(exam.openAt).getTime() + exam.durationMinutes*60000;
  if(closeAt - Date.now() <= 0){
    clearInterval(examTimerInterval); examTimerInterval=null;
    toast("Time's up — submitting your exam", 'info');
    finishExam();
    return;
  }
  el.textContent = formatRemaining(exam);
}

      <button class="btn-primary" style="flex:2;" onclick="nextQuestion()">${isLast?'Review answers':'Next question'}</button>
    </div>
  </div>`;
}
function typeLabel(t){ return t==='mcq'?'Multiple choice': t==='upload'?'File upload': 'Written answer'; }

function questionInputHTML(q, idx){
  if(q.type==='mcq'){
    const picked = state.answers[idx];
    return q.options.map((opt,i)=>{
      let cls='option';
      if(picked!==null && picked!==undefined){
        if(i===q.correctIndex) cls+=' correct';
        else if(i===picked) cls+=' wrong';
      }
      const disabled = (picked!==null && picked!==undefined) ? 'disabled' : '';
      return `<button class="${cls}" ${disabled} onclick="answerMCQ(${i})">${opt}</button>`;
    }).join('');
  }
  if(q.type==='upload'){
    const files = asFileArray(state.answers[idx]);
    return `
      <input type="file" multiple onchange="answerUpload(this, ${idx})">
      <div id="upload-status-${idx}" class="hint">${files.length ? 'Attached: '+files.map(f=>f.name).join(', ') : 'No file attached yet.'}</div>`;
  }
  // text
  const a = state.answers[idx] || '';
  return `<textarea placeholder="Write your explanation here..." oninput="state.answers[${idx}]=this.value">${a}</textarea>`;
}

function answerMCQ(i){
  const exam = state.activeExam;
  const q = exam.questions[state.qIndex];
  state.answers[state.qIndex] = i;
  if(i===q.correctIndex) toast('Correct! 🎉', 'good');
  else toast('Not quite — correct answer highlighted', 'bad');
  render();
}
async function answerUpload(inputEl, idx){
  const newFiles = await pickFiles(inputEl);
  if(newFiles.length===0) return;
  if(!Array.isArray(state.answers[idx])) state.answers[idx] = asFileArray(state.answers[idx]);
  state.answers[idx].push(...newFiles);
  document.getElementById('upload-status-'+idx).textContent = 'Attached: '+state.answers[idx].map(f=>f.name).join(', ');
  toast(newFiles.length>1 ? newFiles.length+' files attached' : 'File attached', 'good');
}

    ${exam.questions.map((q,i)=>{
      const answered = q.type==='mcq' ? (state.answers[i]!==null && state.answers[i]!==undefined)
        : q.type==='upload' ? !!state.answers[i] : !!(state.answers[i] && state.answers[i].trim());

async function finishExam(){
  if(examTimerInterval){ clearInterval(examTimerInterval); examTimerInterval=null; }
  const exam = state.activeExam;
  let autoScore=0, autoTotal=0, manualTotal=0;
  exam.questions.forEach((q,i)=>{
    if(q.type==='mcq'){ autoTotal++; if(state.answers[i]===q.correctIndex) autoScore++; }
    else { manualTotal += (q.points||1); }
  });
  const result = {
    learner: fullName(state.learner), code: exam.code,
    examTitle: exam.title, examGrade: exam.grade, examTopic: exam.topic,
    answers: state.answers,
    paperAnswerFiles: asFileArray(state.paperAnswerFiles),
    autoScore, autoTotal, manualTotal, marks:{},
    submittedAt: new Date().toISOString()
  };
  await sSet('examresult:'+exam.code+':'+keyify(fullName(state.learner)), result);
  go('examResult', { activeExam: exam, feedback: result });
}

function examResultView(){
  const f = state.feedback;
  const hasManual = f.manualTotal>0 || asFileArray(f.paperAnswerFiles||f.paperAnswerFile).length>0;
  const pct = f.autoTotal>0 ? Math.round((f.autoScore/f.autoTotal)*100) : null;
  const msg = pct===null ? "Submitted — awaiting your teacher's marking." : pct>=80 ? "Excellent work on the auto-marked questions!" : pct>=50 ? "Good effort — keep practicing." : "Keep going, you'll get there.";
  return `
  ${brandHTML()}

    ${pct!==null ? `<div class="big">${f.autoScore}/${f.autoTotal}</div>` : `<div class="big" style="font-size:1.6rem;">Submitted</div>`}
    <div class="msg">${msg}</div>
    ${hasManual ? `<div class="hint" style="margin-top:10px;">Some answers here are marked by hand — your teacher will add those marks.</div>` : ''}
  </div>
  <button class="btn-ghost" onclick="openAnswerReview('${state.activeExam.code}')">Review your answers</button>

}

/* ---------- read-only review of a submitted attempt (no marks shown, just what was written) ---------- */
async function openAnswerReview(code, learnerKeyOverride){
  const exam = await sGet('exam:'+code);
  const lk = learnerKeyOverride || keyify(fullName(state.learner));
  const result = await sGet('examresult:'+code+':'+lk);
  if(!exam || !result){ toast('Could not load that submission.', 'bad'); return; }
  go('examAnswerReview', { activeExam: exam, feedback: result });
}
function readOnlyQuestionHTML(q, answer, markInfo){
  if(q.type==='mcq'){
    return q.options.map((opt,i)=>{
      let cls='option';
      if(i===q.correctIndex) cls+=' correct';
      else if(i===answer) cls+=' wrong';
      return `<div class="${cls}">${opt}</div>`;
    }).join('');
  }
  const body = q.type==='upload' ? filesListHTML(answer) : `<div class="hint" style="white-space:pre-wrap;">${answer || '(no answer)'}</div>`;
  return body + markInfo;
}
function examAnswerReviewView(){
  const exam = state.activeExam, r = state.feedback;
  return `
  ${brandHTML()}
  <div class="card">
    <h2>${exam.title} — your answers</h2>
    ${hasPaper(exam) ? `<div class="hint" style="margin-bottom:10px;">
      ${asFileArray(exam.paperFiles||exam.paperFile).map(f=>fileBtn(f,'Question paper: '+f.name)).join('<br>')}
      ${asFileArray(r.paperAnswerFiles||r.paperAnswerFile).length ? '<br>'+asFileArray(r.paperAnswerFiles||r.paperAnswerFile).map(f=>fileBtn(f,'Your answer: '+f.name)).join('<br>') : ''}
      ${r.marks && r.marks.paper!=null ? `<div style="margin-top:6px;"><b style="color:var(--gold);">Paper mark: ${r.marks.paper}</b></div>` : ''}
    </div>` : ''}
    ${exam.questions.map((q,i)=>{
      let markInfo = '';
      if(q.type!=='mcq'){
        const awarded = r.marks && r.marks[i]!=null ? r.marks[i] : null;
        markInfo = `<div style="margin-top:8px;"><b style="color:var(--gold);">${awarded!==null ? 'Marks: '+awarded+'/'+(q.points||1) : 'Not yet marked'}</b></div>`;
      }
      return `
      <div class="qbuilder-item">
        <div class="qtop"><span>Q${i+1} <span class="type-tag type-${q.type}">${typeLabel(q.type)}</span></span></div>
        <div style="margin-bottom:8px;">${q.text}</div>
        ${readOnlyQuestionHTML(q, r.answers[i], markInfo)}
      </div>`;
    }).join('')}
  </div>
  <button class="btn-ghost" onclick="goBack()">Back</button>`;
}

/* ---------- enrich a stored result with exam context, marks, and a percentage/rating ---------- */
async function enrichResult(r){
  const exam = await sGet('exam:'+r.code);
  if(!exam) return { ...r, fullyMarked:false, pct:null, rating:null };
  let manualAwarded=0, manualComplete=true;
  exam.questions.forEach((q,i)=>{
    if(q.type==='mcq') return;
    if(r.marks && r.marks[i]!=null) manualAwarded += Number(r.marks[i]); else manualComplete=false;
  });
  let paperAwarded=0, paperComplete=true;
  if(hasPaper(exam)){
    if(r.marks && r.marks.paper!=null) paperAwarded = Number(r.marks.paper); else paperComplete=false;
  }
  const totalPossible = (r.autoTotal||0) + (r.manualTotal||0) + (hasPaper(exam) ? (exam.paperMaxMarks||0) : 0);
  const totalAwarded = (r.autoScore||0) + manualAwarded + paperAwarded;
  const fullyMarked = manualComplete && paperComplete;
  const pct = (fullyMarked && totalPossible>0) ? Math.round((totalAwarded/totalPossible)*100) : null;
  return { ...r, fullyMarked, totalPossible, totalAwarded, pct, rating: pct!==null ? ratingFor(pct) : null };
}

/* ================= PDF EXPORT ================= */
async function downloadExamPdf(code){
  toast('Preparing PDF…', 'info');
  const exam = await sGet('exam:'+code);
  const keys = await sList('examresult:'+code+':');
  const results = (await Promise.all(keys.map(k=>sGet(k)))).filter(Boolean);
  if(!window.jspdf){ toast('PDF library did not load.', 'bad'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 15;
  doc.setFontSize(15); doc.text(exam.title+' — submissions', 10, y); y+=8;
  doc.setFontSize(10); doc.text('Code '+exam.code+' · Grade '+exam.grade+' · '+exam.topic, 10, y); y+=10;
  if(results.length===0){ doc.text('No submissions yet.', 10, y); }
  results.forEach(r=>{
    if(y>260){ doc.addPage(); y=15; }
    doc.setFontSize(12); doc.text(r.learner+'  —  auto: '+r.autoScore+'/'+r.autoTotal, 10, y); y+=7;
    doc.setFontSize(10);
    exam.questions.forEach((q,i)=>{
      if(q.type==='mcq') return;
      if(y>265){ doc.addPage(); y=15; }
      const lines = doc.splitTextToSize('Q'+(i+1)+': '+stripMath(q.text), 185);
      doc.text(lines, 10, y); y += lines.length*5+2;
      if(q.type==='text'){
        const alines = doc.splitTextToSize('Answer: '+(r.answers[i]||'(no answer)'), 185);
        doc.text(alines, 10, y); y += alines.length*5+4;
      } else {
        const answers = asFileArray(r.answers[i]);
        if(answers.length===0){ doc.text('Answer: no file attached', 10, y); y+=6; }
        answers.forEach(ans=>{
          if(y>265){ doc.addPage(); y=15; }
          doc.text('Answer: uploaded file "'+ans.name+'"', 10, y); y+=6;
          if(ans.type && ans.type.startsWith('image/')){
            try{ doc.addImage(ans.dataUrl, undefined, 10, y, 60, 45); y+=50; }catch(e){}
          } else { y+=4; }
        });
      }
    });
    if(hasPaper(exam)){
      if(y>265){ doc.addPage(); y=15; }
      const ansFiles = asFileArray(r.paperAnswerFiles||r.paperAnswerFile);
      doc.text('Paper answer file(s): '+(ansFiles.length ? ansFiles.map(f=>f.name).join(', ') : 'not submitted'), 10, y); y+=8;
    }
    y+=6;
  });
  doc.save(exam.code+'-submissions.pdf');
  toast('PDF downloaded', 'good');
}
function stripMath(s){ return s.replace(/\$/g,''); }

  switch(state.view){
    case 'home': html = homeView(); break;
    case 'learnerAuth': html = learnerAuthView(); break;
    case 'learnerForgot': html = learnerForgotView(); break;
    case 'learnerDashboard': html = learnerDashboardView(); break;
    case 'examTaking': html = examTakingView(); break;
    case 'examResult': html = examResultView(); break;
    case 'examReview': html = examReviewView(); break;
    case 'examAnswerReview': html = examAnswerReviewView(); break;
    case 'teacherAuth': html = teacherAuthView(); break;
    case 'teacherDashboard': html = teacherDashboardView(); break;
    case 'teacherLeaderboard': html = teacherLeaderboardView(); break;
    case 'examBuilder': html = examBuilderView(); break;
    case 'examCreated': html = examCreatedView(); break;
    case 'examEdit': html = examEditView(); break;
    case 'noteBuilder': html = noteBuilderView(); break;
    case 'classNotes': html = classNotesView(); break;
    case 'history': html = historyView(); break;
    case 'classroom': html = classroomView(); break;
    case 'accountInfo': html = accountInfoView(); break;
    case 'notifications': html = notificationsView(); break;
    case 'learnerSettings': html = learnerSettingsView(); break;
    case 'markSubmissions': html = markSubmissionsView(); break;
    case 'learnerResults': html = learnerResultsView(); break;
    case 'leaderboard': html = leaderboardView(); break;
    default: html = homeView();
  }
  app.innerHTML = html;
  if(state.view==='teacherDashboard'){ renderExamList(); renderNoteList(); }
  if(state.view==='examBuilder') toggleQType();
  if(window.renderMathInElement){
    try{ renderMathInElement(app, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}); }catch(e){}
  }
}

render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.error('SW registration failed', err));
  });
}
</script>
</body>
</html>
