<style>
  :root{
    --bg:#1B1712;
    --surface:#241F18;
    --surface2:#2E2718;
    --grid: rgba(232,217,181,0.055);
    --sand:#EDE1C4;
    --sand-dim:#AFA07C;
    --gold:#D4A24C;
    --gold-dim:#8C6E36;
    --sting:#C1432B;
    --sting-dim:#5A2419;
    --sage:#7A9B5B;
    --sage-dim:#33421F;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 26px 26px;
    color:var(--sand);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em; margin:0; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  #app{ max-width:760px; margin:0 auto; padding:28px 20px 60px; }
  .katex{ font-size:1.05em; }

  .brand{ display:flex; align-items:center; gap:14px; margin-bottom:6px; cursor:pointer; }
  .brand svg{ width:46px; height:30px; flex-shrink:0; }
  .brand-name{ font-size:1.5rem; }
  .brand-tail{ height:3px; width:120px; margin:6px 0 30px 60px; background:linear-gradient(90deg, var(--gold), transparent); border-radius:2px; }
  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; display:block; }

  .card{
    background:var(--surface);
    border:1px solid rgba(212,162,76,0.16);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
  }
  .card h2{ font-size:1.3rem; margin-bottom:4px; }
  .subtext{ color:var(--sand-dim); font-size:0.9rem; margin-bottom:18px; line-height:1.5; }
  .hint{ color:var(--sand-dim); font-size:0.76rem; margin-top:4px; line-height:1.4; }

  label{ display:block; font-size:0.82rem; color:var(--sand-dim); margin:14px 0 6px; }
  input, select, textarea{
    width:100%; padding:11px 12px; border-radius:9px;
    border:1px solid rgba(237,225,196,0.18);
    background:var(--surface2); color:var(--sand);
    font-family:'Space Grotesk', sans-serif; font-size:0.96rem;

  }

  input[type=checkbox]{ width:auto; margin-right:8px; }
  .checkline{ display:flex; align-items:center; margin-top:14px; font-size:0.88rem; color:var(--sand); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:520px){ .row3{ grid-template-columns:1fr; } .row2{grid-template-columns:1fr;} }

  button{
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:0.94rem;
    border:none; border-radius:9px; padding:12px 18px; cursor:pointer;
    transition:transform .1s ease, filter .15s ease;

  button:active{ transform:scale(0.98); }

  .btn-primary:hover{ filter:brightness(1.08); }

  .btn-sm{ padding:8px 14px; font-size:0.85rem; width:auto; margin-top:10px; }
  .link-btn{ background:none; border:none; color:var(--gold); text-decoration:underline; cursor:pointer; font-size:0.85rem; padding:0; }

  .role-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px;}
  .role-card{ background:var(--surface); border:1px solid rgba(212,162,76,0.16); border-radius:var(--radius); padding:22px 16px; text-align:center; cursor:pointer; transition:.15s; }

  .exam-item{ padding:14px 0; border-bottom:1px solid rgba(237,225,196,0.08); }

  .exam-item .row{ display:flex; justify-content:space-between; align-items:center; }

  .type-mcq{ background:var(--sage-dim); color:var(--sage); }
  .type-upload{ background:var(--gold-dim); color:var(--gold); }
  .type-text{ background:rgba(193,67,43,0.18); color:#E38C79; }

  .qcount{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .progress{ height:6px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-bottom:22px; }
  .progress-fill{ height:100%; background:var(--gold); transition:width .3s ease; }

  .option{ display:block; width:100%; text-align:left; padding:13px 14px; margin-bottom:10px; border-radius:9px;
    background:var(--surface2); border:1px solid rgba(237,225,196,0.14); color:var(--sand); font-family:'Space Grotesk'; font-size:0.95rem; cursor:pointer; }

  .option.correct{ background:var(--sage-dim); border-color:var(--sage); color:var(--sage); }
  .option.wrong{ background:var(--sting-dim); border-color:var(--sting); color:#E38C79; }

  .toast{
    position:fixed; top:22px; left:50%; transform:translateX(-50%) translateY(-20px);
    padding:12px 22px; border-radius:10px; font-weight:600; font-size:0.9rem;
    opacity:0; transition:all .25s ease; z-index:50; box-shadow:0 6px 20px rgba(0,0,0,0.35);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.good{ background:var(--sage); color:#12210b; }
  .toast.bad{ background:var(--sting); color:#2a0d08; }
  .toast.info{ background:var(--gold); color:#1B1712; }

  .qbuilder-item{ background:var(--surface2); border-radius:10px; padding:14px; margin-bottom:10px; font-size:0.88rem; }
  .qbuilder-item .qtop{ display:flex; justify-content:space-between; align-items:center; color:var(--sand-dim); font-size:0.75rem; margin-bottom:6px;}
  .remove-x{ background:none; border:none; color:var(--sting); cursor:pointer; font-size:0.8rem; padding:0; }

  .who{ font-size:0.85rem; color:var(--sand-dim); }
  .who b{ color:var(--sand); }
  .logout{ background:none; border:none; color:var(--sand-dim); text-decoration:underline; cursor:pointer; font-size:0.8rem; }

  .score-hero{ text-align:center; padding:30px 20px; }
  .score-hero .big{ font-family:'Fraunces', serif; font-size:3.4rem; color:var(--gold); }
  .score-hero .msg{ color:var(--sand-dim); margin-top:8px; }

  .spinner{ width:18px; height:18px; border:2px solid rgba(237,225,196,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .center{ text-align:center; padding:40px 0; color:var(--sand-dim); }

  .learner-row{ border-bottom:1px solid rgba(237,225,196,0.08); padding:16px 0; }
  .learner-row:last-child{ border-bottom:none; }
  .qmark{ background:var(--surface2); border-radius:9px; padding:12px; margin:8px 0; }
  .qmark .prompt{ margin-bottom:8px; }
  .marks-input{ width:80px; display:inline-block; margin:0 0 0 8px; }

  .menubar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--surface); border:1px solid rgba(212,162,76,0.16); border-radius:12px; padding:10px 12px; margin-bottom:16px; }
  .menubar .mtab{ background:transparent; color:var(--sand-dim); padding:8px 12px; font-size:0.85rem; margin:0; }
  .menubar .mtab.active{ background:var(--gold); color:#1B1712; }
  .menubar select.mgrade{ width:auto; padding:8px 10px; font-size:0.85rem; margin-left:auto; }
  .menubar .mtab.logoutbtn{ color:var(--sting); margin-left:0; }
  @media (max-width:520px){ .menubar select.mgrade{ margin-left:0; order:5; width:100%; } }

  table.resulttable{ width:100%; border-collapse:collapse; font-size:0.88rem; }
  table.resulttable th{ text-align:left; color:var(--sand-dim); font-size:0.72rem; text-transform:uppercase; letter-spacing:.04em; padding:8px 6px; border-bottom:1px solid rgba(237,225,196,0.14); }
  table.resulttable td{ padding:10px 6px; border-bottom:1px solid rgba(237,225,196,0.08); }
  .rating{ display:inline-block; padding:3px 9px; border-radius:6px; font-size:0.72rem; font-weight:700; }
  .rating-BE{ background:var(--sting-dim); color:#E38C79; }
  .rating-AE{ background:var(--gold-dim); color:var(--gold); }
  .rating-ME{ background:var(--sage-dim); color:var(--sage); }
  .rating-EE{ background:#2C4F6B; color:#8FC3E8; }
  .rank-1{ color:var(--gold); font-weight:700; }
</style>

<script>

const firebaseConfig = {

let db = null, firebaseReady = false;
try{
  if(firebaseConfig.apiKey !== "YOUR_API_KEY"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){ console.error('Firebase init failed', e); }

/* ---------- storage helpers, backed by Firestore (shared across every device) ---------- */
async function sGet(key){
  if(!db) return null;
  try{
    const snap = await db.collection('appdata').doc(key).get();
    return snap.exists ? snap.data().value : null;
  }catch(e){ console.error('storage get failed', e); return null; }
}
async function sSet(key, val){
  if(!db) return null;
  try{
    await db.collection('appdata').doc(key).set({ value: val, updatedAt: Date.now() });
    return true;
  }catch(e){ console.error('storage set failed', e); return null; }
}
async function sList(prefix){
  if(!db) return [];
  try{
    const snaps = await db.collection('appdata')
      .orderBy(firebase.firestore.FieldPath.documentId())
      .startAt(prefix).endAt(prefix + '\uf8ff')
      .get();
    return snaps.docs.map(d=>d.id);
  }catch(e){ console.error('storage list failed', e); return []; }
}

function keyify(s){ return s.trim().toLowerCase().replace(/\s+/g,''); }
function fullName(l){ return l.fullName || [l.firstName,l.secondName,l.surname].filter(Boolean).join(' '); }
const USERNAME_RE = /^[A-Za-z]{3,}[0-9]+$/;
function validPassword(p){ return p.length>=4 && /[A-Za-z]/.test(p) && /[0-9]/.test(p); }

const TOPICS = ["Whole Numbers","Fractions","Decimals","Algebra","Calculus","Measurement","Geometry","Data Handling","Money","Time","Ratio & Proportion"];
const MAX_FILE_BYTES = 350 * 1024;
const GRADES = Array.from({length:12},(_,i)=>String(i+1));
let selectedGrade = null;

function gradeOptions(selected){
  return GRADES.map(g=>`<option value="${g}" ${String(selected)===g?'selected':''}>Grade ${g}</option>`).join('');
}
function ratingFor(pct){
  if(pct<30) return 'B.E';
  if(pct<50) return 'A.E';
  if(pct<75) return 'M.E';
  return 'E.E';
}
function ratingClass(rating){ return 'rating-'+rating.replace(/\./g,''); }

function genCode(existing){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code;
  do{
    let tail = "";
    for(let i=0;i<3;i++) tail += chars[Math.floor(Math.random()*chars.length)];
    code = "MS" + tail;
  } while(existing.has(code));
  return code;
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    if(file.size > MAX_FILE_BYTES){ reject(new Error('File is too large — please keep it under 350KB (the shared database has a size limit).')); return; }
    const r = new FileReader();
    r.onload = ()=> resolve({ name:file.name, type:file.type, dataUrl:r.result });
    r.onerror = ()=> reject(new Error('Could not read that file.'));
    r.readAsDataURL(file);
  });
}

/* ---------- app state ---------- */
let state = { view:'home', learner:null, teacher:null, err:'', examDraft:null, activeExam:null, qIndex:0, answers:[], marks:{}, feedback:null, paperAnswerFile:null };

function go(view, extra={}){ state = {...state, view, err:'', ...extra}; render(); }

/* ---------- toast ---------- */
function toast(msg, kind){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 300); }, 1800);
}

function brandHTML(){
  return `
  <div class="brand" onclick="go('home')">

      <path d="M102,46 Q116,40 112,26 Q110,18 100,20" stroke="#D4A24C" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="60" cy="42" rx="22" ry="14" fill="#D4A24C"/>
      <circle cx="60" cy="42" r="6" fill="#1B1712"/>
      <path d="M78,36 Q96,30 100,16 Q102,8 92,4" stroke="#D4A24C" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="86" cy="26" r="3" fill="#D4A24C"/>

/* ================= HOME ================= */
function homeView(){

  ${brandHTML()}
  <span class="eyebrow">Math practice &amp; exams</span>

/* ================= LEARNER AUTH ================= */
let learnerAuthMode = 'login';
function learnerAuthView(){
  return `
  ${brandHTML()}
  <div class="card">
    <div class="toggle-row">
      <button class="${learnerAuthMode==='login'?'active':''}" onclick="learnerAuthMode='login';render()">Log in</button>
      <button class="${learnerAuthMode==='signup'?'active':''}" onclick="learnerAuthMode='signup';render()">Sign up</button>
    </div>
    ${learnerAuthMode==='login' ? learnerLoginForm() : learnerSignupForm()}
    <div class="err">${state.err}</div>
  </div>`;
}
function learnerLoginForm(){
  return `
  <h2 style="margin-top:10px;">Welcome back</h2>
  <p class="subtext">Log in with your full name or username, and your password.</p>
  <label>Full name or username</label>
  <input id="ll-name" placeholder="e.g. mwiz01 or your full name">
  <label>Password</label>
  <input id="ll-pass" type="password" placeholder="Your password">
  <button class="btn-primary" onclick="learnerLogin()">Log in</button>
  <button class="btn-ghost" onclick="go('learnerForgot')">Forgot password?</button>`;
}
function learnerSignupForm(){
  return `
  <h2 style="margin-top:10px;">Create your account</h2>
  <p class="subtext">Fill in your details — you'll log in with your username or full name, plus your password.</p>
  <label>Full name</label>
  <input id="ls-fullname" placeholder="e.g. Jane Wanjiru Otieno">
  <label>Username</label>
  <input id="ls-username" placeholder="e.g. mwiz01">
  <p class="hint">At least 3 letters followed by a number, e.g. mwiz01. Must be unique.</p>
  <div class="row2">
    <div><label>School</label><input id="ls-school" placeholder="e.g. Green Valley Primary"></div>
    <div><label>Grade</label><select id="ls-grade">${gradeOptions('1')}</select></div>
  </div>
  <label>Email (for password recovery)</label>
  <input id="ls-email" type="email" placeholder="you@example.com">
  <div class="row2">
    <div><label>Password</label><input id="ls-pass" type="password" placeholder="At least 4 chars, letters + numbers"></div>
    <div><label>Confirm password</label><input id="ls-pass2" type="password"></div>
  </div>
  <button class="btn-primary" onclick="learnerSignup()">Sign up</button>`;
}
async function learnerSignup(){
  const fullNameVal=val('ls-fullname'), username=val('ls-username'), school=val('ls-school'),
        grade=val('ls-grade'), email=val('ls-email'), pass=val('ls-pass'), pass2=val('ls-pass2');
  if(!fullNameVal||!username||!school||!email||!pass||!pass2){ setErr('Please fill in every field.'); return; }
  if(!USERNAME_RE.test(username)){ setErr('Username needs at least 3 letters followed by a number, e.g. mwiz01.'); return; }
  if(!validPassword(pass)){ setErr('Password must be at least 4 characters with a mix of letters and numbers.'); return; }
  if(pass!==pass2){ setErr('Passwords do not match.'); return; }
  const uk = keyify(username);
  const nk = keyify(fullNameVal);
  const takenUser = await sGet('learner:'+uk);
  if(takenUser){ setErr('That username is taken — pick another.'); return; }
  const takenName = await sGet('learnername:'+nk);
  if(takenName){ setErr('An account with that name already exists — try logging in.'); return; }
  const learner = { fullName: fullNameVal, username, school, grade, email, password: pass };
  await sSet('learner:'+uk, learner);
  await sSet('learnername:'+nk, { usernameKey: uk });
  toast('Account created — welcome!', 'good');
  go('learnerDashboard', { learner });
}
async function resolveLearner(identifier){
  const k = keyify(identifier);
  let learner = await sGet('learner:'+k);
  let key = k;
  if(!learner){
    const map = await sGet('learnername:'+k);
    if(map){ learner = await sGet('learner:'+map.usernameKey); key = map.usernameKey; }
  }
  return { learner, key };
}
async function learnerLogin(){
  const id=val('ll-name'), pass=val('ll-pass');
  if(!id||!pass){ setErr('Enter your name or username, and your password.'); return; }
  const { learner } = await resolveLearner(id);
  if(!learner || learner.password !== pass){ setErr('Name/username or password is incorrect.'); return; }
  go('learnerDashboard', { learner });
}

let recoveryCode = null, recoveryKey = null;

function typeLabel(t){ return t==='mcq'?'Multiple choice': t==='upload'?'File upload': 'Written answer'; }

function questionInputHTML(q, idx){
  if(q.type==='mcq'){
    const picked = state.answers[idx];
    return q.options.map((opt,i)=>{
      let cls='option';
      if(picked!==null && picked!==undefined){
        if(i===q.correctIndex) cls+=' correct';
        else if(i===picked) cls+=' wrong';
      }
      const disabled = (picked!==null && picked!==undefined) ? 'disabled' : '';
      return `<button class="${cls}" ${disabled} onclick="answerMCQ(${i})">${opt}</button>`;
    }).join('');
  }
  if(q.type==='upload'){
    const a = state.answers[idx];
    return `
      <input type="file" onchange="answerUpload(this, ${idx})">
      <div id="upload-status-${idx}" class="hint">${a ? 'Attached: '+a.name : 'No file attached yet.'}</div>`;
  }
  // text
  const a = state.answers[idx] || '';
  return `<textarea placeholder="Write your explanation here..." oninput="state.answers[${idx}]=this.value">${a}</textarea>`;
}

function answerMCQ(i){
  const exam = state.activeExam;
  const q = exam.questions[state.qIndex];
  state.answers[state.qIndex] = i;
  if(i===q.correctIndex) toast('Correct! 🎉', 'good');

  render();
}
async function answerUpload(inputEl, idx){
  const file = inputEl.files[0];
  if(!file) return;
  try{
    const data = await readFileAsDataURL(file);
    state.answers[idx] = data;
    document.getElementById('upload-status-'+idx).textContent = 'Attached: '+data.name;
    toast('File attached', 'good');
  }catch(e){
    toast(e.message, 'bad');
  }
}

async function answerPaperUpload(inputEl){
  const file = inputEl.files[0];
  if(!file) return;

function continueFromPaper(){
  const exam = state.activeExam;
  if(exam.questions.length>0){ state.qIndex = 0; render(); }
  else { finishExam(); }
}

async function nextQuestion(){
  const exam = state.activeExam;
  if(state.qIndex+1 < exam.questions.length){ state.qIndex++; render(); return; }
  await finishExam();
}
async function finishExam(){
  const exam = state.activeExam;
  let autoScore=0, autoTotal=0, manualTotal=0;
  exam.questions.forEach((q,i)=>{
    if(q.type==='mcq'){ autoTotal++; if(state.answers[i]===q.correctIndex) autoScore++; }
    else { manualTotal += (q.points||1); }
  });
  const result = {
    learner: fullName(state.learner), code: exam.code,
    examTitle: exam.title, examGrade: exam.grade, examTopic: exam.topic,
    answers: state.answers,
    paperAnswerFile: state.paperAnswerFile || null,
    autoScore, autoTotal, manualTotal, marks:{},
    submittedAt: new Date().toISOString()
  };
  await sSet('examresult:'+exam.code+':'+keyify(fullName(state.learner)), result);
  go('examResult', { activeExam: exam, feedback: result });
}

/* ---------- enrich a stored result with exam context, marks, and a percentage/rating ---------- */
async function enrichResult(r){
  const exam = await sGet('exam:'+r.code);
  if(!exam) return { ...r, fullyMarked:false, pct:null, rating:null };
  let manualAwarded=0, manualComplete=true;
  exam.questions.forEach((q,i)=>{
    if(q.type==='mcq') return;
    if(r.marks && r.marks[i]!=null) manualAwarded += Number(r.marks[i]); else manualComplete=false;
  });
  let paperAwarded=0, paperComplete=true;
  if(exam.paperFile){
    if(r.marks && r.marks.paper!=null) paperAwarded = Number(r.marks.paper); else paperComplete=false;
  }
  const totalPossible = (r.autoTotal||0) + (r.manualTotal||0) + (exam.paperFile ? (exam.paperMaxMarks||0) : 0);
  const totalAwarded = (r.autoScore||0) + manualAwarded + paperAwarded;
  const fullyMarked = manualComplete && paperComplete;
  const pct = (fullyMarked && totalPossible>0) ? Math.round((totalAwarded/totalPossible)*100) : null;
  return { ...r, fullyMarked, totalPossible, totalAwarded, pct, rating: pct!==null ? ratingFor(pct) : null };
}

let leaderboardCache = [];
async function openLeaderboard(){
  if(!selectedGrade) selectedGrade = Number(state.learner ? state.learner.grade : 1);
  const keys = await sList('examresult:');
  const raw = (await Promise.all(keys.map(k=>sGet(k)))).filter(Boolean);
  const enriched = await Promise.all(raw.map(enrichResult));
  const filtered = enriched.filter(r=>r.fullyMarked && String(r.examGrade)===String(selectedGrade));
  const byLearner = {};
  filtered.forEach(r=>{
    if(!byLearner[r.learner]) byLearner[r.learner] = { learner:r.learner, total:0, count:0 };
    byLearner[r.learner].total += r.pct; byLearner[r.learner].count++;
  });
  leaderboardCache = Object.values(byLearner)
    .map(x=>({ ...x, avg: Math.round(x.total/x.count) }))
    .sort((a,b)=> b.avg - a.avg);
  go('leaderboard');
}

async function attachPaperFile(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  try{
    const data = await readFileAsDataURL(file);
    state.examDraft.paperFile = data;
    document.getElementById('paper-file-name').textContent = 'Attached: '+data.name;
    toast('Question paper attached', 'good');
  }catch(e){ toast(e.message, 'bad'); }
}

function syncDraft(){
  const d = state.examDraft;
  d.title = val('eb-title'); d.grade = val('eb-grade'); d.topic = val('eb-topic');
  d.durationMinutes = Number(val('eb-duration')) || 30; d.openAt = val('eb-open');
  const cb = document.getElementById('eb-allow-upload');
  if(cb) d.allowPaperAnswerUpload = cb.checked;
  const pm = document.getElementById('eb-paper-max');
  if(pm) d.paperMaxMarks = Number(pm.value) || 0;
}
function addQuestion(){
  syncDraft();
  const type = val('qb-type');
  const text = val('qb-text');
  if(!text){ setErr('Write the question text.'); render(); return; }
  if(type==='mcq'){
    const a=val('qb-a'), b=val('qb-b'), c=val('qb-c'), d2=val('qb-d'), correct=Number(val('qb-correct'));
    if(!a||!b||!c||!d2){ setErr('Fill in all four options.'); render(); return; }
    state.examDraft.questions.push({ id: Date.now()+Math.random(), type, text, options:[a,b,c,d2], correctIndex: correct });
  } else {
    const points = Number(val('qb-points')) || 1;
    state.examDraft.questions.push({ id: Date.now()+Math.random(), type, text, points });
  }
  state.err='';
  render();
}
function removeQuestion(i){ syncDraft(); state.examDraft.questions.splice(i,1); render(); }

async function saveExam(){
  syncDraft();
  const d = state.examDraft;
  if(!d.title){ setErr('Give the exam a title.'); return; }
  if(!d.openAt){ setErr('Set when the exam opens.'); return; }
  if(d.questions.length===0 && !d.paperFile){ setErr('Add at least one question, or attach a question paper.'); return; }
  const existingKeys = new Set(await sList('exam:'));
  const code = genCode(existingKeys);
  const exam = { ...d, code, teacherUsername: state.teacher.username };
  await sSet('exam:'+code, exam);
  toast('Exam created — code '+code, 'good');
  go('examCreated', { activeExam: exam });
}

function examCreatedView(){
  const exam = state.activeExam;
  return `
  ${brandHTML()}
  <div class="card score-hero">
    <div class="eyebrow">Share this code with learners</div>
    <div class="big mono">${exam.code}</div>
    <div class="msg">Opens ${new Date(exam.openAt).toLocaleString()} · runs ${exam.durationMinutes} min</div>
  </div>
  <button class="btn-primary" onclick="go('teacherDashboard')">Back to dashboard</button>`;
}

/* ================= MARK SUBMISSIONS ================= */
let markingExam = null, markingResults = [];
async function openMarking(code){
  markingExam = await sGet('exam:'+code);
  const keys = await sList('examresult:'+code+':');
  markingResults = (await Promise.all(keys.map(k=>sGet(k)))).filter(Boolean);
  go('markSubmissions');
}
function markSubmissionsView(){
  const exam = markingExam;
  if(!exam) return `${brandHTML()}<p class="subtext">Exam not found.</p><button class="btn-ghost" onclick="go('teacherDashboard')">Back</button>`;
  const manualQs = exam.questions.map((q,i)=>({q,i})).filter(x=>x.q.type!=='mcq');
  return `
  ${brandHTML()}
  <div class="card">
    <h2>${exam.title}</h2>
    <p class="subtext">Code ${exam.code} · ${markingResults.length} submission(s)</p>
    ${markingResults.length===0 ? '<p class="subtext">No submissions yet.</p>' : markingResults.map((r,ri)=>`
      <div class="learner-row">
        <div style="font-weight:600;">${r.learner}</div>
        <div class="hint">Auto-marked: ${r.autoScore}/${r.autoTotal} ${r.manualTotal>0?'· Hand-marked out of '+r.manualTotal:''}</div>
        ${exam.paperFile && r.paperAnswerFile ? `<div style="margin-top:8px;"><a class="dl" href="${r.paperAnswerFile.dataUrl}" download="${r.paperAnswerFile.name}">⬇ Download ${r.learner}'s answer file</a>
          <div style="margin-top:6px;">Paper mark: <input class="marks-input" type="number" min="0" id="paper-mark-${ri}" value="${r.marks && r.marks.paper!=null ? r.marks.paper : ''}"></div></div>` : ''}
        ${manualQs.map(({q,i})=>`
          <div class="qmark">
            <div class="prompt">${q.text} <span class="hint">(out of ${q.points||1})</span></div>
            ${q.type==='text' ? `<div class="hint" style="white-space:pre-wrap;">${(r.answers[i]||'(no answer)')}</div>` :
              (r.answers[i] ? `<a class="dl" href="${r.answers[i].dataUrl}" download="${r.answers[i].name}">⬇ ${r.answers[i].name}</a>` : `<div class="hint">(no file attached)</div>`)}
            <div style="margin-top:8px;">Mark: <input class="marks-input" type="number" min="0" max="${q.points||1}" id="mark-${ri}-${i}" value="${r.marks && r.marks[i]!=null ? r.marks[i] : ''}"></div>
          </div>`).join('')}
        <button class="btn-ghost btn-sm" onclick="saveMarks(${ri})">Save marks for ${r.learner.split(' ')[0]}</button>
      </div>
    `).join('')}
  </div>
  <button class="btn-ghost" onclick="downloadExamPdf('${exam.code}')">Download PDF of all submissions</button>
  <button class="btn-ghost" onclick="go('teacherDashboard')">Back to dashboard</button>`;
}
async function saveMarks(ri){
  const exam = markingExam;
  const r = markingResults[ri];
  const marks = {};
  exam.questions.forEach((q,i)=>{
    if(q.type==='mcq') return;
    const el = document.getElementById('mark-'+ri+'-'+i);
    if(el && el.value!=='') marks[i] = Number(el.value);
  });
  if(exam.paperFile){
    const pel = document.getElementById('paper-mark-'+ri);
    if(pel && pel.value!=='') marks.paper = Number(pel.value);
  }
  r.marks = marks;
  await sSet('examresult:'+exam.code+':'+keyify(r.learner), r);
  toast('Marks saved for '+r.learner, 'good');
}

/* ================= PDF EXPORT ================= */
async function downloadExamPdf(code){
  toast('Preparing PDF…', 'info');
  const exam = await sGet('exam:'+code);
  const keys = await sList('examresult:'+code+':');
  const results = (await Promise.all(keys.map(k=>sGet(k)))).filter(Boolean);
  if(!window.jspdf){ toast('PDF library did not load.', 'bad'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 15;
  doc.setFontSize(15); doc.text(exam.title+' — submissions', 10, y); y+=8;
  doc.setFontSize(10); doc.text('Code '+exam.code+' · Grade '+exam.grade+' · '+exam.topic, 10, y); y+=10;
  if(results.length===0){ doc.text('No submissions yet.', 10, y); }
  results.forEach(r=>{
    if(y>260){ doc.addPage(); y=15; }
    doc.setFontSize(12); doc.text(r.learner+'  —  auto: '+r.autoScore+'/'+r.autoTotal, 10, y); y+=7;
    doc.setFontSize(10);
    exam.questions.forEach((q,i)=>{
      if(q.type==='mcq') return;
      if(y>265){ doc.addPage(); y=15; }
      const lines = doc.splitTextToSize('Q'+(i+1)+': '+stripMath(q.text), 185);
      doc.text(lines, 10, y); y += lines.length*5+2;
      if(q.type==='text'){
        const alines = doc.splitTextToSize('Answer: '+(r.answers[i]||'(no answer)'), 185);
        doc.text(alines, 10, y); y += alines.length*5+4;
      } else {
        const ans = r.answers[i];
        doc.text('Answer: uploaded file "'+(ans?ans.name:'none')+'"', 10, y); y+=6;
        if(ans && ans.type && ans.type.startsWith('image/')){
          try{ doc.addImage(ans.dataUrl, undefined, 10, y, 60, 45); y+=50; }catch(e){}
        } else { y+=4; }
      }
    });
    if(exam.paperFile){
      if(y>265){ doc.addPage(); y=15; }
      doc.text('Paper answer file: '+(r.paperAnswerFile?r.paperAnswerFile.name:'not submitted'), 10, y); y+=8;
    }
    y+=6;
  });
  doc.save(exam.code+'-submissions.pdf');
  toast('PDF downloaded', 'good');
}
function stripMath(s){ return s.replace(/\$/g,''); }

/* ---------- utils ---------- */
function val(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function setErr(msg){ state.err = msg; render(); }

/* ---------- root render ---------- */
function setupNeededView(){
  return `
  ${brandHTML()}
  <div class="card">
    <h2>One more step</h2>
    <p class="subtext">This app needs a free Firebase database connected before it can save signups, exams, and results.</p>
    <ol class="hint" style="padding-left:18px; line-height:1.9;">
      <li>Go to <span class="mono">console.firebase.google.com</span> → Add project (free)</li>
      <li>Build → Firestore Database → Create database → start in <b>test mode</b></li>
      <li>Gear icon → Project settings → "Your apps" → click <span class="mono">&lt;/&gt;</span> to register a web app</li>
      <li>Copy the config values shown, paste them into <span class="mono">firebaseConfig</span> near the top of this file's code</li>
      <li>Re-upload the file to GitHub as <span class="mono">index.html</span> — the live site updates automatically</li>
    </ol>
  </div>`;
}
function render(){
  const app = document.getElementById('app');
  if(!firebaseReady){ app.innerHTML = setupNeededView(); return; }
  let html = '';
  switch(state.view){
    case 'home': html = homeView(); break;
    case 'learnerAuth': html = learnerAuthView(); break;
    case 'learnerForgot': html = learnerForgotView(); break;
    case 'learnerDashboard': html = learnerDashboardView(); break;
    case 'examTaking': html = examTakingView(); break;
    case 'examResult': html = examResultView(); break;
    case 'teacherAuth': html = teacherAuthView(); break;
    case 'teacherDashboard': html = teacherDashboardView(); break;
    case 'examBuilder': html = examBuilderView(); break;
    case 'examCreated': html = examCreatedView(); break;
    case 'markSubmissions': html = markSubmissionsView(); break;
    case 'learnerResults': html = learnerResultsView(); break;
    case 'leaderboard': html = leaderboardView(); break;
    default: html = homeView();
  }
  app.innerHTML = html;
  if(state.view==='teacherDashboard') renderExamList();
  if(state.view==='examBuilder') toggleQType();
  if(window.renderMathInElement){
    try{ renderMathInElement(app, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}); }catch(e){}
  }
}

render();
</script>
